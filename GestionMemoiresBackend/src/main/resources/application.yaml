spring:
  application:
    name: GestionMemoiresBackend
  
  # PostgreSQL Database Configuration
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/gestion_memoires_db
    username:
    password:
    driver-class-name: org.postgresql.Driver
  
  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  # Jackson Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
  
  # File Upload Configuration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      enabled: true
  
  # Spring Security Configuration
  security:
    user:
      name: admin
      password: admin123

# Server Configuration
server:
  port: 8082
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false
  servlet:
    context-path: /api

# JWT Configuration
app:
  jwt:
    secret: v3RyT3MpS3cR3tK3yF0rM3m0ir3M4n4g3m3ntB4ck3nd2025!VeryLongAndSecureKey
    expiration: 86400000
    refresh-expiration: 604800000

# Logging Configuration
logging:
  level:
    com.ujkz.memoire: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/gestion-memoires.log
    max-size: 10MB
    max-history: 7

# CORS Configuration
cors:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:4200
    - http://localhost:8081
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
    - OPTIONS
  allowed-headers:
    - Authorization
    - Content-Type
    - X-Requested-With
    - Accept
    - Origin
    - Access-Control-Request-Method
    - Access-Control-Request-Headers
  allow-credentials: true
  max-age: 3600

# API Documentation
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: none
  show-actuator: true
  paths-to-match: /**

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

# Custom application info
info:
  app:
    name: Gestion Mémoires Master
    version: 1.0.0
    description: Plateforme de gestion des mémoires de Master
    contact: Dr Flavien SOMDA